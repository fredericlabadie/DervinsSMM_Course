<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" role="img" aria-labelledby="central-metaphor-title central-metaphor-desc">
  <title id="central-metaphor-title">Adapted Dervin Sense-Making gap-bridging model</title>
  <desc id="central-metaphor-desc">A course-adapted schematic of Dervin's gap-bridging model. A person moves through space-time from a situated context, encounters gaps, engages in sense-making and un-making, constructs bridges, draws on sources and relevances, and moves toward outcomes in situations.</desc>

  <defs>
    <style>
      .sm-line{stroke:#0c1410;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
      .sm-thin{stroke:#a06a3a;stroke-width:1;fill:none;stroke-linecap:round;stroke-linejoin:round}
      .sm-box{fill:#e3e6d3;stroke:#a06a3a;stroke-width:1}
      .sm-soft{fill:#f2f0df;stroke:#a06a3a;stroke-width:.8}
      .sm-title{font-family:'IBM Plex Mono',Consolas,monospace;font-size:15px;font-weight:700;letter-spacing:1.2px;fill:#0c1410}
      .sm-text{font-family:'IBM Plex Serif',Georgia,serif;font-size:14px;fill:#0c1410}
      .sm-small{font-family:'IBM Plex Serif',Georgia,serif;font-size:12px;fill:#0c1410}
      .sm-mono{font-family:'IBM Plex Mono',Consolas,monospace;font-size:10px;font-weight:600;letter-spacing:.8px;fill:#a06a3a}
      .sm-ital{font-family:'Cormorant Garamond',Georgia,serif;font-size:28px;font-style:italic;font-weight:600;fill:#0c1410;letter-spacing:1.5px}
    </style>
    <pattern id="bridge-stone" patternUnits="userSpaceOnUse" width="26" height="14">
      <path d="M0 12 L26 12 M8 0 L8 12 M18 0 L18 12" stroke="#a06a3a" stroke-width=".65" opacity=".75"/>
      <rect x="0" y="0" width="26" height="14" fill="none"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0c1410"/>
    </marker>
  </defs>

  <!-- frame -->
  <rect x="14" y="14" width="972" height="532" fill="none" stroke="#0c1410" stroke-width="1.6"/>

  <!-- cloud / context -->
  <path d="M70 126 C55 120 48 105 60 94 C50 80 66 66 82 72 C92 54 120 56 130 72 C144 58 174 62 180 82 C200 80 214 94 208 110 C226 118 222 140 198 144 L88 144 C78 144 70 138 70 126 Z" fill="#f2f0df" stroke="#0c1410" stroke-width="1.4"/>
  <text x="88" y="90" class="sm-title">CONTEXT</text>
  <text x="88" y="108" class="sm-small">• power structures/dynamics</text>
  <text x="88" y="124" class="sm-small">• organisations/systems</text>
  <text x="88" y="140" class="sm-small">• cultures/communities</text>

  <!-- person -->
  <g class="sm-line">
    <circle cx="210" cy="178" r="22" fill="#f2f0df"/>
    <circle cx="202" cy="174" r="2" fill="#0c1410"/>
    <circle cx="216" cy="174" r="2" fill="#0c1410"/>
    <path d="M202 184 Q210 190 218 184" stroke-width="1.2"/>
    <path d="M210 200 L210 274"/>
    <path d="M210 220 L178 248"/>
    <path d="M210 220 L252 236"/>
    <path d="M210 274 L190 344"/>
    <path d="M210 274 L242 344"/>
  </g>

  <!-- ground / chasm -->
  <path class="sm-line" d="M30 354 C90 344 144 344 198 352 C248 360 286 372 320 392 L350 414 C392 442 456 448 500 426 C552 400 596 360 650 342 C730 316 822 322 970 336"/>
  <path d="M320 392 L350 414 C392 442 456 448 500 426 C552 400 596 360 650 342 C620 426 558 496 448 510 C370 500 320 452 320 392 Z" fill="#a06a3a" opacity=".15"/>

  <!-- bridge -->
  <path d="M322 374 C402 334 514 316 650 324 L668 350 C528 348 414 364 336 406 Z" fill="url(#bridge-stone)" stroke="#0c1410" stroke-width="1.5"/>
  <text x="485" y="314" text-anchor="middle" class="sm-title">BRIDGES</text>
  <text x="485" y="334" text-anchor="middle" class="sm-small">ideas · cognitions · feelings · memories · stories</text>

  <!-- central sense-making -->
  <rect x="356" y="400" width="250" height="112" rx="4" class="sm-box"/>
  <text x="481" y="426" text-anchor="middle" class="sm-title">SENSE-MAKING</text>
  <text x="481" y="445" text-anchor="middle" class="sm-title">&amp; UN-MAKING</text>
  <text x="378" y="468" class="sm-text">• verbings</text>
  <text x="378" y="486" class="sm-text">• procedurings</text>
  <text x="378" y="504" class="sm-text">• strategies/tactics</text>

  <!-- gap label -->
  <rect x="182" y="424" width="164" height="88" rx="4" class="sm-soft"/>
  <text x="196" y="450" class="sm-title">GAPS</text>
  <text x="196" y="472" class="sm-text">• questions/confusions</text>
  <text x="196" y="490" class="sm-text">• muddles/riddles</text>
  <text x="196" y="508" class="sm-text">• angst</text>
  <path class="sm-thin" d="M344 456 C366 454 378 458 392 470"/>

  <!-- situation -->
  <rect x="52" y="366" width="178" height="136" rx="4" class="sm-soft"/>
  <text x="68" y="392" class="sm-title">SITUATION</text>
  <text x="68" y="414" class="sm-text">• history</text>
  <text x="68" y="432" class="sm-text">• experience</text>
  <text x="68" y="450" class="sm-text">• horizons</text>
  <text x="68" y="468" class="sm-text">• constraints/barriers</text>
  <text x="68" y="486" class="sm-text">• habits/skills</text>

  <!-- relevances and sources -->
  <rect x="716" y="318" width="230" height="116" rx="4" class="sm-soft"/>
  <text x="736" y="344" class="sm-title">RELEVANCES</text>
  <text x="736" y="366" class="sm-text">criteria used to evaluate</text>
  <text x="736" y="384" class="sm-text">sense or movement:</text>
  <text x="736" y="406" class="sm-small">questions · answers · information</text>
  <text x="736" y="422" class="sm-small">designs · sources · channels</text>

  <rect x="716" y="448" width="230" height="70" rx="4" class="sm-soft"/>
  <text x="736" y="474" class="sm-title">SOURCES</text>
  <text x="736" y="496" class="sm-text">channels · media · people</text>
  <text x="736" y="514" class="sm-text">institutions</text>

  <!-- outcomes -->
  <rect x="676" y="42" width="276" height="110" rx="4" class="sm-soft"/>
  <text x="696" y="70" class="sm-title">OUTCOMES IN SITUATIONS</text>
  <text x="696" y="94" class="sm-text">• helps/facilitations</text>
  <text x="696" y="114" class="sm-text">• hurts/hindrances</text>
  <text x="696" y="134" class="sm-text">• consequences/impacts/effects</text>

  <!-- flags / outcome marker -->
  <g class="sm-line">
    <line x1="760" y1="312" x2="760" y2="204"/>
    <path d="M760 204 L802 214 L760 228 Z" fill="#a06a3a" stroke="#a06a3a"/>
    <line x1="812" y1="318" x2="812" y2="186"/>
    <path d="M812 186 L864 200 L812 216 Z" fill="#0c1410"/>
  </g>

  <!-- arrows / flows -->
  <path d="M252 236 C312 244 354 276 394 326" class="sm-thin" marker-end="url(#arrow)"/>
  <path d="M604 456 C660 440 696 406 718 378" class="sm-thin" marker-end="url(#arrow)"/>
  <path d="M834 318 C820 264 820 198 804 152" class="sm-thin" marker-end="url(#arrow)"/>
  <path d="M716 486 C646 500 616 498 604 486" class="sm-thin" marker-end="url(#arrow)"/>

  <!-- space-time axis -->
  <g>
    <line x1="54" y1="530" x2="190" y2="530" stroke="#0c1410" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="54" y1="530" x2="54" y2="472" stroke="#0c1410" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="72" y="548" class="sm-title">SPACE-TIME</text>
  </g>

  <text x="956" y="538" text-anchor="end" class="sm-mono">COURSE ADAPTATION AFTER DERVIN'S GAP-BRIDGING MODEL</text>
</svg>
