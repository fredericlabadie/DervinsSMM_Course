<script>
document.addEventListener('DOMContentLoaded', function() {
  // 1. Relocate header to first child of body
  var header = document.getElementById('smm-header');
  if (header) document.body.insertBefore(header, document.body.firstChild);

  // 2. Relocate footer to last child of body
  var footer = document.querySelector('.smm-footer');
  if (footer) document.body.appendChild(footer);

  // 3. Relocate callout band right after header
  var callout = document.getElementById('smm-callout');
  if (callout && header) header.insertAdjacentElement('afterend', callout);

  // 4. Highlight active nav item
  var path = window.location.pathname.split('/').pop() || 'index.html';
  var page = path.replace('.html','') || 'index';
  document.querySelectorAll('#smm-nav a').forEach(function(a) {
    if (a.getAttribute('data-page') === page) a.classList.add('active');
  });

  // 5. Flatten Quarto containers
  var qc = document.getElementById('quarto-content');
  if (qc) { qc.style.display = 'block'; qc.style.padding = '0'; qc.style.margin = '0'; }
  var mc = document.getElementById('quarto-document-content');
  if (mc) { mc.style.maxWidth = 'none'; mc.style.padding = '0'; mc.style.margin = '0'; }
});
</script>
